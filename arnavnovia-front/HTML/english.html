<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>משחק אנגלית 🎈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#6C5CE7; --primary-dark:#5546c9; --primary-soft:#efeafe;
    --accent:#ff7a59; --success:#22c55e; --success-soft:#dcfce7;
    --error:#ef4444; --error-soft:#fee2e2;
    --ink:#1e2340; --muted:#7a7f9a; --line:#e7e8f2; --card:#ffffff;
    --shadow:0 10px 30px -12px rgba(60,50,120,.35);
    --shadow-sm:0 4px 14px -6px rgba(60,50,120,.3);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Rubik',system-ui,-apple-system,'Segoe UI','Arial Hebrew',sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,#eef2ff 0%,#faf5ff 48%,#fff1f2 100%);
    background-attachment:fixed;
    min-height:100%;
    display:flex; align-items:flex-start; justify-content:center;
    padding:16px;
  }
  #app{width:100%; max-width:540px; margin:auto}
  .screen{animation:pop .35s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{opacity:0; transform:translateY(10px) scale(.98)}to{opacity:1; transform:none}}

  h1,h2{font-family:'Fredoka','Rubik',sans-serif; margin:0}
  .title{font-size:2.1rem; font-weight:700; text-align:center; margin-bottom:4px}
  .subtitle{text-align:center; color:var(--muted); margin-bottom:22px; font-size:1.05rem}

  .card{background:var(--card); border-radius:26px; padding:26px 22px; box-shadow:var(--shadow)}
  .en{direction:ltr; unicode-bidi:isolate}

  /* Buttons */
  .btn{border:none; cursor:pointer; font-family:inherit; font-weight:600; border-radius:16px; transition:transform .12s, box-shadow .2s, background .2s}
  .btn:active{transform:scale(.96)}
  .btn-primary{background:linear-gradient(135deg,var(--primary),#8b7bef); color:#fff; font-size:1.25rem; padding:16px 22px; width:100%; box-shadow:0 10px 22px -8px rgba(108,92,231,.7)}
  .btn-primary:hover{box-shadow:0 14px 26px -8px rgba(108,92,231,.85)}
  .btn-ghost{background:#fff; color:var(--primary); font-size:1.05rem; padding:14px 20px; width:100%; box-shadow:var(--shadow-sm)}
  .btn-ghost:hover{background:var(--primary-soft)}
  .stack{display:flex; flex-direction:column; gap:12px; margin-top:18px}

  /* Login */
  .players{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:8px}
  .player-card{position:relative; background:#fff; border:2px solid var(--line); border-radius:20px; padding:16px 10px; text-align:center; cursor:pointer; transition:transform .12s,border-color .2s,box-shadow .2s}
  .player-card:hover{border-color:var(--primary); transform:translateY(-3px); box-shadow:var(--shadow-sm)}
  .player-card .avatar{font-size:2.6rem; line-height:1}
  .player-card .pname{font-weight:600; margin-top:6px; font-size:1.05rem; word-break:break-word}
  .player-card .pbest{font-size:.8rem; color:var(--muted); margin-top:2px}
  .player-card .del{position:absolute; top:6px; inset-inline-start:6px; width:24px; height:24px; border-radius:50%; border:none; background:#f1f1f6; color:#b0b3c6; font-size:.9rem; cursor:pointer; opacity:0; transition:opacity .2s}
  .player-card:hover .del{opacity:1}
  .player-card .del:hover{background:var(--error-soft); color:var(--error)}
  .newrow{display:flex; gap:10px; margin-top:16px}
  .text-input{flex:1; border:2px solid var(--line); border-radius:16px; padding:14px 16px; font-family:inherit; font-size:1.1rem; outline:none; transition:border-color .2s}
  .text-input:focus{border-color:var(--primary)}

  /* Home */
  .hero{display:flex; align-items:center; gap:14px; justify-content:center; margin-bottom:6px}
  .hero .avatar{font-size:3rem}
  .hero .hi{font-size:1.7rem; font-weight:700}
  .statsrow{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:18px 0 4px}
  .stat-card{background:#fff; border-radius:20px; padding:16px; text-align:center; box-shadow:var(--shadow-sm)}
  .stat-card .big{font-size:2rem; font-weight:800; font-family:'Fredoka',sans-serif}
  .stat-card .lbl{color:var(--muted); font-size:.9rem; margin-top:2px}
  .stat-card.score .big{color:var(--primary)}
  .stat-card.streak .big{color:var(--accent)}

  /* HUD (quiz) */
  .hud{display:flex; align-items:center; gap:10px; margin-bottom:14px}
  .icon-btn{width:42px; height:42px; border-radius:14px; border:none; background:#fff; color:var(--muted); font-size:1.1rem; cursor:pointer; box-shadow:var(--shadow-sm); flex:0 0 auto}
  .icon-btn:hover{color:var(--ink)}
  .chip{background:#fff; border-radius:14px; padding:8px 14px; font-weight:700; box-shadow:var(--shadow-sm); font-size:1.05rem}
  .chip .em{margin-inline-end:2px}
  .hud .spacer{flex:1}
  .progress{height:12px; background:#e9eaf6; border-radius:999px; overflow:hidden; margin-bottom:18px}
  .progress-bar{height:100%; width:0; background:linear-gradient(90deg,var(--primary),#9b8bff); border-radius:999px; transition:width .4s ease}

  /* Question */
  .q-label{color:var(--muted); text-align:center; font-size:1rem; margin-bottom:14px; font-weight:500}
  .prompt-box{display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; min-height:70px; margin-bottom:8px}
  .prompt{font-size:2.4rem; font-weight:700; text-align:center; line-height:1.2}
  .prompt.english{font-family:'Fredoka','Rubik',sans-serif}
  .options{display:grid; gap:12px; margin-top:20px}
  .opt{display:flex; align-items:center; gap:10px; justify-content:center; background:#fff; border:2px solid var(--line); border-radius:18px; padding:16px 14px; font-size:1.35rem; font-weight:600; cursor:pointer; transition:transform .1s,border-color .15s,background .15s; text-align:center}
  .opt:hover:not(:disabled){border-color:var(--primary); background:var(--primary-soft)}
  .opt:active:not(:disabled){transform:scale(.97)}
  .opt:disabled{cursor:default}
  .opt.correct{border-color:var(--success); background:var(--success-soft); color:#166534}
  .opt.wrong{border-color:var(--error); background:var(--error-soft); color:#991b1b}
  .opt.dim{opacity:.45}
  .opt .opt-en{direction:ltr; font-family:'Fredoka','Rubik',sans-serif}

  /* Play button */
  .play{flex:0 0 auto; width:46px; height:46px; border-radius:50%; border:none; background:var(--primary-soft); color:var(--primary); font-size:1.3rem; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:transform .12s,background .2s}
  .play:hover{background:#e2d9fd; transform:scale(1.08)}
  .play:active{transform:scale(.92)}
  .play.sm{width:38px; height:38px; font-size:1.05rem}
  .play.speaking{animation:pulse .7s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,.4)}50%{box-shadow:0 0 0 8px rgba(108,92,231,0)}}

  /* Open answer */
  .answer-input{width:100%; border:2px solid var(--line); border-radius:18px; padding:16px; font-family:inherit; font-size:1.6rem; text-align:center; outline:none; margin-top:20px; transition:border-color .2s}
  .answer-input:focus{border-color:var(--primary)}
  .answer-input.correct{border-color:var(--success); background:var(--success-soft)}
  .answer-input.wrong{border-color:var(--error); background:var(--error-soft)}

  /* Feedback banner */
  .banner{margin-top:18px; border-radius:18px; padding:16px; text-align:center; font-size:1.15rem; font-weight:600; animation:pop .3s}
  .banner.ok{background:var(--success-soft); color:#166534}
  .banner.no{background:var(--error-soft); color:#991b1b}
  .banner .ans{display:inline-flex; align-items:center; gap:8px; margin-top:6px; font-weight:700; direction:ltr}
  .banner .he-ans{direction:rtl; font-weight:700}

  /* Config */
  .field{margin:20px 0}
  .field .flabel{display:flex; justify-content:space-between; font-weight:600; margin-bottom:8px}
  .field .flabel .pct{color:var(--primary); font-weight:800}
  input[type=range]{width:100%; accent-color:var(--primary); height:8px}
  .seg{display:flex; gap:8px}
  .seg button{flex:1; padding:12px; border-radius:14px; border:2px solid var(--line); background:#fff; font-family:inherit; font-weight:600; font-size:1.05rem; cursor:pointer; transition:.15s}
  .seg button.on{border-color:var(--primary); background:var(--primary-soft); color:var(--primary)}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; margin:20px 0}
  .switch{position:relative; width:56px; height:32px; flex:0 0 auto}
  .switch input{opacity:0; width:0; height:0}
  .slider{position:absolute; inset:0; background:#d5d7e6; border-radius:999px; cursor:pointer; transition:.2s}
  .slider:before{content:""; position:absolute; height:26px; width:26px; inset-inline-start:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 2px 4px rgba(0,0,0,.2)}
  .switch input:checked + .slider{background:var(--primary)}
  .switch input:checked + .slider:before{transform:translateX(-24px)}
  .hint{color:var(--muted); font-size:.85rem; margin-top:4px}

  /* Spaced-repetition */
  .rev-badge{display:inline-block; background:#fff3e0; color:#c2410c; border-radius:999px; padding:2px 10px; font-size:.8rem; font-weight:700; margin-inline-end:6px}
  .rev-row{display:flex; align-items:center; gap:10px; padding:12px 6px; border-bottom:1px solid var(--line)}
  .rev-row:last-child{border-bottom:none}
  .rev-word{display:flex; align-items:center; gap:8px; flex:0 0 auto; min-width:120px; font-weight:700; font-family:'Fredoka','Rubik',sans-serif}
  .rev-he{flex:1; color:var(--ink); text-align:start}
  .dots{display:flex; gap:5px; flex:0 0 auto}
  .dot{width:10px; height:10px; border-radius:50%; background:var(--line)}
  .dot.on{background:var(--success)}

  /* Results */
  .result-emoji{font-size:4.5rem; text-align:center; line-height:1; margin-bottom:6px}
  .result-title{text-align:center; font-size:1.9rem; font-weight:700; font-family:'Fredoka',sans-serif; margin-bottom:16px}
  .record{background:linear-gradient(135deg,#fff7d6,#ffe9c2); color:#a06a00; border-radius:14px; padding:10px; text-align:center; font-weight:700; margin-bottom:14px}

  /* Confetti */
  #confetti{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50}
  .conf{position:absolute; top:-30px; font-size:1.5rem; animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg); opacity:.9}}
</style>
</head>

<div id="app"></div>
<div id="confetti"></div>

/* ---------- spaced repetition (Leitner boxes) ----------
   Each word a player missed enters a practice pool at box 0. A correct answer
   promotes it a box (with a growing gap before it's due again); a wrong answer
   knocks it back. Reaching SR_LEARNED graduates it out of the pool. Spacing is
   measured in "questions answered" (pd.counter), not clock time. */
const SR_INTERVAL = [3,6,14,30];  // gap (in questions) before a box 0..3 word is due again
const SR_LEARNED = 4;             // box >= this => learnt (leaves the pool)
function ensurePlayer(pd){ if(!pd) return pd; if(typeof pd.counter!=='number') pd.counter=0; if(!pd.words) pd.words={}; return pd; }
function activePool(pd){ return Object.entries(pd.words||{}).filter(([_,w])=>!w.learned).map(([en,w])=>({en,...w})); }
function dueWords(pd){ return activePool(pd).filter(w=>w.dueAt<=pd.counter).sort((a,b)=> (a.dueAt-b.dueAt) || (a.box-b.box)); }
function reviewFraction(n){ return n<=0 ? 0 : Math.min(0.5, Math.max(0.10, n*0.06)); }
// update a word's SR state after an answer; a first miss creates the entry
function recordAnswer(pd, en, ok){
  let w = pd.words[en];
  if(!ok){
    if(!w) w = pd.words[en] = {correct:0, wrong:0, box:0, dueAt:0, learned:false};
    w.wrong++; w.learned=false;
    w.box = Math.max(0, w.box-1);
    w.dueAt = pd.counter + SR_INTERVAL[0];        // missed -> bring it back soon
  } else if(w && !w.learned){
    w.correct++; w.box++;
    if(w.box>=SR_LEARNED){ w.learned=true; w.dueAt=pd.counter+999999; }
    else w.dueAt = pd.counter + SR_INTERVAL[w.box];
  }
  // correct answer on a never-missed or already-learnt word = no-op
}

let voices = [];
function loadVoices(){ try{ voices = window.speechSynthesis.getVoices()||[] }catch(e){} }
if('speechSynthesis' in window){ loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
function cleanForSpeech(t){
  return t.split('/')[0].replace(/\(.*?\)/g,'').replace(/\b(sth|swh|sb)\b/g,'').replace(/[?.]/g,'').trim();
}
function speak(text, btn){
  if(!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(cleanForSpeech(text));
  u.lang='en-US'; u.rate=0.88; u.pitch=1.05;
  const v = voices.find(v=>/en[-_]?US/i.test(v.lang)) || voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  if(v) u.voice=v;
  window.speechSynthesis.cancel();
  if(btn){ btn.classList.add('speaking'); u.onend=u.onerror=()=>btn.classList.remove('speaking'); }
  window.speechSynthesis.speak(u);
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* normalise Hebrew for open-answer grading */
function normHe(s){
  return String(s)
    .replace(/[֑-ׇ]/g,'')      // niqqud
    .replace(/[.,;:!?"'׳״״`]/g,'')
    .replace(/[()]/g,'')
    .replace(/[-–—־]/g,' ')     // hyphens/maqaf -> space (e.g. תשע-עשרה)
    .replace(/\s+/g,' ').trim();
}
function acceptableAnswers(he, alt){
  let list = he.split(/[\/,]/).map(p=>p.replace(/\(.*?\)/g,''));
  if(Array.isArray(alt)) list = list.concat(alt);
  return list.map(normHe).filter(Boolean);
}

/* ---------- ROUND ---------- */
function enabledTypes(c){ return [['enHe',c.enHe],['heEn',c.heEn],['open',c.open]].filter(x=>x[1]>0); }
function weightedPick(pairs){ // pairs: [[key,weight],...]
  const t=pairs.reduce((s,x)=>s+x[1],0)||1; let r=Math.random()*t;
  for(const [k,v] of pairs){ if(r<v) return k; r-=v; }
  return pairs[0] ? pairs[0][0] : 'enHe';
}
function pickType(c){ const e=enabledTypes(c); return e.length? weightedPick(e) : 'enHe'; }
// choose a valid type for a specific word (phrases can't be typed)
function pickTypeFor(word,c){
  let e=enabledTypes(c);
  if(word.type!=='word') e=e.filter(x=>x[0]!=='open');
  if(!e.length) e = word.type==='word' ? [['enHe',1]] : [['enHe',1]];
  return weightedPick(e);
}
function buildQuestion(type, pool, wordPool, forced, review, exclude){
  let target=forced;
  if(!target){
    const src = type==='open' ? wordPool : pool;
    for(let t=0;t<25 && !target;t++){ const cand=src[Math.floor(Math.random()*src.length)]; if(!exclude || !exclude.has(cand.en)) target=cand; }
    if(!target){ const src2=type==='open'?wordPool:pool; target=src2[Math.floor(Math.random()*src2.length)]; }
  }
  if(type==='open') return {type, target, review:!!review};
  const field = type==='enHe' ? 'he' : 'en';
  const correct = target[field];
  const seen=new Set([correct]); const distractors=[];
  const bag=shuffle(pool);
  for(const w of bag){ if(distractors.length>=3) break; const val=w[field]; if(!seen.has(val)){ seen.add(val); distractors.push(val); } }
  const options=shuffle([correct,...distractors]);
  return {type, target, field, correct, options, review:!!review};
}
// place review questions spread evenly through the round; each appears once
function buildOrder(normals, reviews){
  const total=normals.length+reviews.length;
  const slots=new Array(total).fill(null);
  reviews.forEach((rv,i)=>{
    let idx=Math.min(total-1, Math.floor((i+0.5)*total/reviews.length));
    while(slots[idx]!==null) idx=(idx+1)%total;
    slots[idx]=rv;
  });
  let n=0;
  for(let i=0;i<total;i++){ if(slots[i]===null) slots[i]=normals[n++]; }
  return slots;
}
function startRound(){
  const c=getConfig();
  const pd=ensurePlayer(getPlayers()[player]);
  const pool = c.phrases ? WORDS : WORDS.filter(w=>w.type==='word');
  const wordPool = WORDS.filter(w=>w.type==='word');
  const byEn={}; WORDS.forEach(w=>byEn[w.en]=w);
  const N=c.perRound;

  // spaced-repetition: pick due practice words, scaling the share with pool size
  let reviewTargets=[];
  if(c.review!==false){
    const active=activePool(pd);
    const due=dueWords(pd);
    const slots=Math.min(Math.round(N*reviewFraction(active.length)), due.length, N);
    reviewTargets=due.slice(0,slots).map(w=>byEn[w.en]).filter(Boolean);
  }
  const exclude=new Set(reviewTargets.map(w=>w.en));
  const reviewQs=reviewTargets.map(tw=>buildQuestion(pickTypeFor(tw,c), pool, wordPool, tw, true));
  const normalQs=[];
  for(let i=0;i<N-reviewQs.length;i++){ normalQs.push(buildQuestion(pickType(c), pool, wordPool, null, false, exclude)); }

  round={qs:buildOrder(normalQs, reviewQs), i:0, score:0, streak:0, best:0, correct:0, cfg:c};
  showQuestion();
}

function hud(){
  const pct = Math.round(round.i/round.qs.length*100);
  return `
    <div class="hud">
      <button class="icon-btn" id="quitBtn" aria-label="יציאה">✕</button>
      <div class="spacer"></div>
      <div class="chip"><span class="em">⭐</span><span id="score">${round.score}</span></div>
      <div class="chip"><span class="em">🔥</span><span id="streak">${round.streak}</span></div>
    </div>
    <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>`;
}

function showQuestion(){
  const q=round.qs[round.i];
  round.phase='question';
  const rev = q.review ? '<span class="rev-badge">🔁 תרגול</span>' : '';
  let body='';
  if(q.type==='open'){
    body=`
      <div class="q-label">${rev}מה התרגום לעברית?</div>
      <div class="prompt-box">
        <div class="prompt english en">${esc(cleanForSpeech(q.target.en))}</div>
        ${playBtnHTML(q.target.en)}
      </div>
      <input class="answer-input" id="ans" dir="rtl" placeholder="הקלד/י כאן..." autocomplete="off" autocapitalize="off">
      <div id="fb"></div>
      <div class="stack"><button class="btn btn-primary" id="go">בדיקה</button></div>`;
  } else if(q.type==='enHe'){
    body=`
      <div class="q-label">${rev}מה התרגום לעברית?</div>
      <div class="prompt-box">
        <div class="prompt english en">${esc(cleanForSpeech(q.target.en))}</div>
        ${playBtnHTML(q.target.en)}
      </div>
      <div class="options" id="opts">
        ${q.options.map((o,idx)=>`<button class="opt" data-idx="${idx}">${esc(o)}</button>`).join('')}
      </div>
      <div id="fb"></div>`;
  } else { // heEn
    body=`
      <div class="q-label">${rev}מה המילה באנגלית?</div>
      <div class="prompt-box"><div class="prompt">${esc(q.target.he)}</div></div>
      <div class="options" id="opts">
        ${q.options.map((o,idx)=>`<button class="opt" data-idx="${idx}"><span class="opt-en en">${esc(o)}</span>${playBtnHTML(o,'sm')}</button>`).join('')}
      </div>
      <div id="fb"></div>`;
  }
  app.innerHTML=`<div class="screen">${hud()}<div class="card">${body}</div></div>`;
  document.getElementById('quitBtn').onclick=quitRound;

  if(q.type==='open'){
    document.getElementById('ans').focus();
    document.getElementById('go').onclick=checkOpen;
    // Enter is handled globally (see keydown listener) so a single press
    // checks the answer instead of racing ahead to the next question.
  } else {
    app.querySelectorAll('.opt').forEach(b=> b.addEventListener('click',()=>answerMC(+b.dataset.idx)));
  }
}

function answerMC(idx){
  const q=round.qs[round.i];
  const btns=[...app.querySelectorAll('.opt')];
  const chosen=q.options[idx];
  const ok = chosen===q.correct;
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(q.options[i]===q.correct) b.classList.add('correct');
    else if(i===idx) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  registerAnswer(ok, q);
}
function checkOpen(){
  const q=round.qs[round.i];
  const inp=document.getElementById('ans');
  const val=normHe(inp.value);
  if(!val) return;
  const ok=acceptableAnswers(q.target.he, q.target.alt).includes(val);
  inp.disabled=true; inp.classList.add(ok?'correct':'wrong');
  document.getElementById('go').style.display='none';
  registerAnswer(ok, q, true);
}

function registerAnswer(ok, q, isOpen){
  round.phase='feedback';
  // persist spaced-repetition state + exposure counter after every answer
  const players=getPlayers(); const pd=ensurePlayer(players[player]);
  pd.counter=(pd.counter||0)+1;
  recordAnswer(pd, q.target.en, ok);
  savePlayers(players);
  if(ok){
    round.correct++; round.streak++; round.best=Math.max(round.best,round.streak);
    round.score += 10 + Math.min(round.streak-1,5)*2;
  } else {
    round.streak=0;
  }
  document.getElementById('score').textContent=round.score;
  document.getElementById('streak').textContent=round.streak;

  const answerLine = q.type==='heEn'
    ? `<span class="ans"><span class="en">${esc(q.correct)}</span>${playBtnHTML(q.correct,'sm')}</span>`
    : `<span class="he-ans">${esc(q.type==='open'? q.target.he : q.correct)}</span>`;
  const fb=document.getElementById('fb');
  fb.innerHTML = ok
    ? `<div class="banner ok">🎉 ${['כל הכבוד!','מצוין!','נכון מאוד!','יופי!','אלוף/ה!'][Math.floor(Math.random()*5)]}</div>`
    : `<div class="banner no">🙈 כמעט! התשובה: ${answerLine}</div>`;
  const next=document.createElement('div');
  next.className='stack';
  const last = round.i>=round.qs.length-1;
  next.innerHTML=`<button class="btn btn-primary" id="next">${last?'לסיום 🏁':'המשך ➜'}</button>`;
  fb.appendChild(next);
  bindPlay(fb);
  document.getElementById('next').onclick=advance;
}
function advance(){
  round.i++;
  if(round.i>=round.qs.length) showResults();
  else showQuestion();
}
function quitRound(){ if(confirm('לצאת מהמשחק? ההתקדמות תאבד.')) showHome(); }

/* ---------- RESULTS ---------- */
function showResults(){
  round.phase='done';
  const total=round.qs.length, correct=round.correct, score=round.score;
  const rate=correct/total;
  const p=getPlayers(); const me=p[player];
  const newScore = score>(me.bestScore||0);
  const newStreak = round.best>(me.bestStreak||0);
  me.bestScore=Math.max(me.bestScore||0,score);
  me.bestStreak=Math.max(me.bestStreak||0,round.best);
  me.games=(me.games||0)+1;
  savePlayers(p);

  let emoji='🎯', title='כל הכבוד!';
  if(rate===1){ emoji='🏆'; title='מושלם!'; }
  else if(rate>=0.7){ emoji='🌟'; title='עבודה יפה!'; }
  else if(rate>=0.4){ emoji='💪'; title='ממשיכים להתאמן!'; }
  else { emoji='🌱'; title='כל התחלה קשה!'; }

  app.innerHTML=`
    <div class="screen">
      <div class="card">
        <div class="result-emoji">${emoji}</div>
        <div class="result-title">${title}</div>
        ${(newScore||newStreak)?`<div class="record">🎉 שיא חדש${newScore&&newStreak?' בנקודות וברצף!':newScore?' בנקודות!':' ברצף!'}</div>`:''}
        <div class="statsrow" style="margin-top:0">
          <div class="stat-card score"><div class="big">${score}</div><div class="lbl">⭐ נקודות</div></div>
          <div class="stat-card streak"><div class="big">${round.best}</div><div class="lbl">🔥 רצף שיא</div></div>
        </div>
        <div class="stat-card" style="margin-top:12px"><div class="big" style="color:var(--ink)">${correct}/${total}</div><div class="lbl">תשובות נכונות</div></div>
      </div>
      <div class="stack">
        <button class="btn btn-primary" id="again">▶ שוב!</button>
        <button class="btn btn-ghost" id="home">🏠 תפריט ראשי</button>
      </div>
    </div>`;
  document.getElementById('again').onclick=startRound;
  document.getElementById('home').onclick=showHome;
  if(rate>=0.7 || newScore || newStreak) confetti();
}

/* ---------- confetti ---------- */
function confetti(){
  const box=document.getElementById('confetti');
  const em=['🎉','⭐','🎈','✨','🌟','🎊'];
  for(let i=0;i<36;i++){
    const s=document.createElement('div');
    s.className='conf'; s.textContent=em[Math.floor(Math.random()*em.length)];
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(2+Math.random()*2)+'s';
    s.style.animationDelay=(Math.random()*0.6)+'s';
    s.style.fontSize=(1.1+Math.random()*1.4)+'rem';
    box.appendChild(s);
    setTimeout(()=>s.remove(),4200);
  }
}

/* ---------- global play delegation ---------- */
function bindPlay(root){ root.querySelectorAll('.play').forEach(b=>{ if(b._bound) return; b._bound=1; b.addEventListener('click',e=>{ e.stopPropagation(); speak(b.dataset.say,b); }); }); }
new MutationObserver(()=>bindPlay(document)).observe(app,{childList:true,subtree:true});

/* ---------- Enter key: one press = one action, no double-fire ---------- */
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter' || !round) return;
  if(round.phase==='feedback'){ e.preventDefault(); advance(); }
  else if(round.phase==='question' && round.qs[round.i].type==='open'){ e.preventDefault(); checkOpen(); }
});

/* ---------- go ---------- */
showLogin();
</script>
